<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TEMPEI MUSIC JOURNEY</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg2:#111;--bg3:#1c1c1c;
  --text:#e6e2d8;--text2:#88847e;--text3:#3e3c3a;
  --accent:#c8b89a;--accent2:#7a6a4e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --font:'Helvetica Neue','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:var(--font);overflow:hidden;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}

/* SCREENS */
.screen{position:fixed;inset:0;opacity:0;pointer-events:none;
transition:opacity 0.55s var(–ease);overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{opacity:1;pointer-events:all}
.screen::-webkit-scrollbar{display:none}.screen{scrollbar-width:none}

/* OPENING */
#screen-opening{display:flex;flex-direction:column;align-items:center;
justify-content:center;background:var(–bg);overflow:hidden}
.op-eyebrow{font-size:10px;letter-spacing:.38em;color:var(–text3);font-weight:300;
text-transform:uppercase;margin-bottom:6px;
opacity:0;animation:fadeUp 1.1s .4s ease forwards}
.op-title{font-size:clamp(22px,6vw,30px);letter-spacing:.14em;color:var(–text);
font-weight:200;text-transform:uppercase;margin-bottom:80px;
opacity:0;animation:fadeUp 1.1s .8s ease forwards}
.op-menu{display:flex;flex-direction:column;gap:32px;
opacity:0;animation:fadeUp 1.1s 1.5s ease forwards}
.op-btn{background:none;border:none;color:var(–text);font-family:var(–font);
font-size:12px;letter-spacing:.32em;font-weight:300;cursor:pointer;
display:flex;align-items:center;gap:14px;padding:6px 0;text-transform:uppercase;
position:relative;transition:color .3s}
.op-btn::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:1px;
background:var(–accent2);transform:scaleX(0);transform-origin:left;
transition:transform .4s ease}
.op-btn:hover{color:var(–accent)}.op-btn:hover::after{transform:scaleX(1)}
.op-btn.muted{color:var(–text3)}.op-btn.muted:hover{color:var(–text2)}
.op-arrow{color:var(–accent2);font-size:9px}
.op-footer{position:absolute;bottom:40px;font-size:9px;letter-spacing:.22em;
color:var(–text3);text-transform:uppercase;
opacity:0;animation:fadeUp 1.1s 2.3s ease forwards}

/* MAP */
#screen-map{background:var(–bg);display:flex;flex-direction:column}
.map-hdr{position:fixed;top:0;left:0;right:0;z-index:10;
padding:54px 28px 24px;
background:linear-gradient(to bottom,var(–bg) 55%,transparent);
pointer-events:none}
.map-hdr-sub{font-size:9px;letter-spacing:.36em;color:var(–text2);
text-transform:uppercase;font-weight:300}
.map-hdr-title{font-size:17px;font-weight:200;letter-spacing:.1em;
color:var(–text);margin-top:4px}
.map-wrap{width:100%;height:100vh;display:flex;
flex-direction:column;align-items:center;justify-content:center;
overflow:hidden;position:relative;padding:0 16px}
/* 地図コンテナ：%ベース絶対配置の基準 */
.japan-map-wrap{
position:relative;
width:min(92vw,520px);
aspect-ratio:520/640;
flex-shrink:0;
}
/* 実SVG地図 */
.japan-map-wrap svg.japan-map-svg{
position:absolute;inset:0;
width:100%;height:100%;
opacity:0.72;
display:block;
}
/* ピンボタン（%配置） */
.map-point{
position:absolute;
transform:translate(-50%,-50%);
background:none;border:none;
cursor:pointer;
display:flex;flex-direction:column;align-items:center;gap:5px;
padding:0;
-webkit-tap-highlight-color:transparent;
}
.map-point-dot{
width:8px;height:8px;border-radius:50%;
background:#c8b89a;
position:relative;
transition:transform .2s ease;
}
.map-point-dot::before{
content:’’;position:absolute;
top:50%;left:50%;
width:8px;height:8px;border-radius:50%;
border:1px solid #c8b89a;
transform:translate(-50%,-50%);
animation:map-pulse 2.6s ease-out infinite;
}
.map-point:active .map-point-dot{transform:scale(1.5)}
.map-point-label{
font-family:‘Helvetica Neue’,‘Hiragino Kaku Gothic ProN’,sans-serif;
font-size:8.5px;letter-spacing:0.14em;
color:#78746e;text-transform:uppercase;
background:rgba(8,8,8,0.82);
padding:2px 6px;
white-space:nowrap;
}
@keyframes map-pulse{
0%{opacity:.5;width:8px;height:8px}
100%{opacity:0;width:26px;height:26px;
top:50%;left:50%;transform:translate(-50%,-50%)}
}
.map-back{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
background:none;border:1px solid var(–border2);color:var(–text2);
font-family:var(–font);font-size:9px;letter-spacing:.24em;
text-transform:uppercase;padding:13px 28px;cursor:pointer;
transition:color .3s,border-color .3s}
.map-back:hover{color:var(–text);border-color:var(–accent2)}

/* DETAIL */
#screen-detail{background:var(–bg);min-height:100vh}

/* Slideshow */
.d-slideshow{width:100%;aspect-ratio:16/10;position:relative;overflow:hidden;background:var(–bg3);touch-action:pan-y}
.d-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.d-slide.active{opacity:1}
.d-slide img{width:100%;height:100%;object-fit:cover;display:block}
.d-slide-empty{width:100%;height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:8px}
.d-slide-empty-name{font-size:22px;font-weight:200;letter-spacing:.08em;color:var(–text3)}
.d-slide-empty-en{font-size:10px;letter-spacing:.3em;color:var(–text3);text-transform:uppercase}
.d-slide-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
display:flex;gap:7px;z-index:2}
.d-slide-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.28);
transition:background .3s,transform .3s;cursor:pointer}
.d-slide-dot.active{background:rgba(255,255,255,.82);transform:scale(1.35)}
.d-slide-counter{position:absolute;top:14px;right:16px;
font-size:9px;letter-spacing:.18em;color:rgba(255,255,255,.35);z-index:2}
.d-body{padding:30px 28px 56px}
.d-era{font-size:9px;letter-spacing:.36em;color:var(–accent2);text-transform:uppercase;
font-weight:300;margin-bottom:10px}
.d-name-en{font-size:11px;letter-spacing:.26em;color:var(–text2);
text-transform:uppercase;font-weight:300;margin-bottom:4px}
.d-name{font-size:28px;font-weight:200;letter-spacing:.06em;color:var(–text);
line-height:1.2;margin-bottom:6px}
.d-region{font-size:11px;color:var(–text3);letter-spacing:.1em;margin-bottom:22px}
.d-rule{width:36px;height:1px;background:var(–accent2);margin-bottom:22px}
.d-intro{font-size:15px;letter-spacing:.04em;color:var(–text);
font-weight:300;line-height:1.9;margin-bottom:8px}
.d-desc{font-size:12px;letter-spacing:.04em;color:var(–text2);
font-weight:300;line-height:2;margin-bottom:10px}

/* Music strip */
.d-music-strip{display:flex;align-items:center;gap:12px;
padding:14px 16px;margin:24px 0 32px;
border:1px solid var(–border);background:rgba(255,255,255,.02)}
.d-music-thumb{width:40px;height:40px;object-fit:cover;flex-shrink:0;opacity:.8}
.d-music-thumb-empty{width:40px;height:40px;background:var(–bg3);flex-shrink:0;
display:flex;align-items:center;justify-content:center;font-size:16px;color:var(–text3)}
.d-music-info{flex:1;min-width:0}
.d-music-title{font-size:12px;color:var(–text);letter-spacing:.05em;font-weight:300;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-music-meta{font-size:10px;color:var(–text3);letter-spacing:.12em;margin-top:3px}
.d-music-mood{font-size:9px;color:var(–accent2);letter-spacing:.18em;
text-transform:uppercase;flex-shrink:0}

/* Video */
.d-video-wrap{width:100%;aspect-ratio:16/9;background:#000;margin-bottom:36px;
position:relative;overflow:hidden}
.d-video-ph{width:100%;height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:10px;
background:var(–bg3);border:1px solid var(–border);cursor:pointer;
transition:border-color .3s}
.d-video-ph:hover{border-color:var(–border2)}
.d-video-play-icon{width:44px;height:44px;border:1px solid var(–border2);border-radius:50%;
display:flex;align-items:center;justify-content:center;transition:border-color .3s}
.d-video-ph:hover .d-video-play-icon{border-color:var(–accent2)}
.d-video-play-icon span{font-size:13px;color:var(–text2);padding-left:3px}
.d-video-label{font-size:10px;letter-spacing:.2em;color:var(–text3);text-transform:uppercase}
.d-video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* Action buttons */
.d-actions{display:flex;flex-direction:column;gap:14px}
.d-btn{background:none;border:1px solid var(–border);color:var(–text2);
font-family:var(–font);font-size:10px;letter-spacing:.28em;text-transform:uppercase;
padding:17px 20px;cursor:pointer;
transition:color .3s,border-color .3s,background .3s;
display:flex;align-items:center;justify-content:space-between;font-weight:300}
.d-btn.primary{border-color:var(–accent2);color:var(–accent)}
.d-btn:hover{border-color:var(–accent2);color:var(–text);background:rgba(255,255,255,.02)}
.d-btn-arr{color:var(–accent2);font-size:12px}
.d-ambient{margin-top:44px;padding-top:22px;border-top:1px solid var(–border)}
.d-ambient p{font-size:11px;letter-spacing:.14em;color:var(–text3);
font-weight:300;line-height:1.9;font-style:italic}

/* Loading */
#loading{position:fixed;inset:0;background:var(–bg);display:flex;
align-items:center;justify-content:center;z-index:200;transition:opacity .8s ease}
#loading.hide{opacity:0;pointer-events:none}
.ld-dots{display:flex;gap:8px}
.ld-dot{width:3px;height:3px;background:var(–text3);border-radius:50%;
animation:ldot 1.4s ease-in-out infinite}
.ld-dot:nth-child(2){animation-delay:.2s}.ld-dot:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,80%,100%{opacity:.15;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* Toast */
.toast{position:fixed;bottom:96px;left:50%;
transform:translateX(-50%) translateY(12px);
background:var(–bg3);border:1px solid var(–border2);
color:var(–text2);font-size:10px;letter-spacing:.15em;
padding:12px 20px;opacity:0;transition:opacity .4s,transform .4s;
pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@supports (padding-top: env(safe-area-inset-top)){
.map-hdr{padding-top:calc(env(safe-area-inset-top) + 18px)}
.map-back{bottom:calc(env(safe-area-inset-bottom) + 24px)}
.op-footer{bottom:calc(env(safe-area-inset-bottom) + 24px)}
}
</style>

</head>

    intro_text:'音が消える場所', description_short:'海と祈りの気配が残る場所',
    hero_image_url:'', youtube_embed_url:'', music_id:'MUSIC_001',
    music_title:'熊野用メイン曲', music_title_en:'Kumano Main Theme',
    mood_tag:'静寂 / 祈り', ambient_note:'波音と風の印象', era_label:'Japan Chapter' },
  { location_id:'JP_HOKKAIDO', region:'北海道',   location_name:'北海道',   location_name_en:'Hokkaido',
    latitude:43.5,   longitude:143.0,   display_order:2, unlock_order:2, is_active:true,
    intro_text:'どこまでも続く音', description_short:'広がる景色の中に音が溶けていく場所',
    hero_image_url:'', youtube_embed_url:'', music_id:'MUSIC_002',
    music_title:'北海道用メイン曲', music_title_en:'Hokkaido Main Theme',
    mood_tag:'広がり / 孤独', ambient_note:'風と遠さの印象', era_label:'Japan Chapter' },
  { location_id:'JP_YAMANASHI', region:'山梨県', location_name:'河口湖町', location_name_en:'Kawaguchiko',
    latitude:35.490, longitude:138.763, display_order:3, unlock_order:3, is_active:true,
    intro_text:'音がぶつかる場所', description_short:'河口湖から望む雄大な富士の威厳を感じる場所',
    hero_image_url:'', youtube_embed_url:'', music_id:'MUSIC_003',
    music_title:'山梨県メイン曲', music_title_en:'Kawaguchiko Main Theme',
    mood_tag:'壮大 / 決意', ambient_note:'荘厳な富士の印象', era_label:'Japan Chapter' }
];

// ── STATE ────────────────────────────────────────
let locations = [], currentId = null, currentEmbedUrl = '';

// ── BOOT ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  checkContinue();
  setTimeout(() => document.getElementById('loading').classList.add('hide'), 700);
});

async function loadData() {
  if (GAS_URL === 'YOUR_GAS_DEPLOYMENT_URL_HERE') {
    locations = FALLBACK; renderPins(); return;
  }
  try {
    const r = await fetch(GAS_URL);
    const j = await r.json();
    locations = (j.locations && j.locations.length) ? j.locations : FALLBACK;
  } catch(e) { console.warn('GAS fetch failed', e); locations = FALLBACK; }
  renderPins();
}

// ── PINS ─────────────────────────────────────────
// SVG viewBox: 0 0 520 640
// 経度122.5〜146.5 → x, 緯度24〜46 → y（上が北）
function latLonToPercent(lat, lon) {
  const px = (lon - 122.5) / (146.5 - 122.5) * 100;
  const py = (46 - lat)    / (46 - 24)        * 100;
  return { px: Math.round(px * 10) / 10, py: Math.round(py * 10) / 10 };
}

function renderPins() {
  const wrap = document.getElementById('map-points');
  wrap.innerHTML = '';

  locations.forEach((loc, i) => {
    const { px, py } = latLonToPercent(+loc.latitude, +loc.longitude);

    const btn = document.createElement('button');
    btn.className = 'map-point';
    btn.style.left = px + '%';
    btn.style.top  = py + '%';
    btn.style.animationDelay = (i * 0.3) + 's';
    btn.addEventListener('click', () => showDetail(loc.location_id));

    const dot = document.createElement('div');
    dot.className = 'map-point-dot';
    dot.style.animationDelay = (i * 0.7) + 's';

    const label = document.createElement('div');
    label.className = 'map-point-label';
    label.textContent = (loc.location_name_en || '').toUpperCase();

    btn.appendChild(dot);
    btn.appendChild(label);
    wrap.appendChild(btn);
  });
}

// ── NAVIGATION ───────────────────────────────────
function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-'+n);
  if(el){ el.classList.add('active'); el.scrollTop=0; }
}
function checkContinue() {
  const saved = localStorage.getItem('tempei_last');
  const ok = saved && locations.find(l=>l.location_id===saved);
  document.getElementById('btn-continue').classList.toggle('muted', !ok);
}
function startNewJourney() {
  showScreen('map');
  const first = locations.find(l=>+l.unlock_order===1)||locations[0];
  if(first) setTimeout(()=>showDetail(first.location_id), 380);
}
function continueJourney() {
  const saved = localStorage.getItem('tempei_last');
  if(saved && locations.find(l=>l.location_id===saved)){
    showScreen('map'); setTimeout(()=>showDetail(saved),380);
  } else { showToast('No saved journey. Starting from the beginning.'); startNewJourney(); }
}

// ── SLIDESHOW ────────────────────────────────────
let ssTimer = null;
let ssCurrent = 0;
let ssImages = [];
let ssTouchX = 0;

// GoogleドライブのURLを直接表示可能なURLに変換
function gdriveUrl(url) {
  if (!url) return '';
  url = String(url).trim();
  // 共有リンク形式: /file/d/FILE_ID/view
  const m = url.match(/\/file\/d\/([^/]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w1200';
  // すでにthumbnail形式 or 通常URL
  return url;
}

function buildSlideshow(images) {
  const wrap = document.getElementById('d-slideshow');
  const dots = document.getElementById('d-slide-dots');
  const counter = document.getElementById('d-slide-counter');

  // スライドのみ削除（dots/counterは残す）
  wrap.querySelectorAll('.d-slide').forEach(el => el.remove());
  dots.innerHTML = '';
  ssCurrent = 0;
  ssImages = images;
  clearInterval(ssTimer);

  if (!images || images.length === 0) {
    // 画像なし → プレースホルダー
    const slide = document.createElement('div');
    slide.className = 'd-slide active';
    slide.innerHTML = `<div class="d-slide-empty">
      <p class="d-slide-empty-name" id="d-slide-empty-name"></p>
      <p class="d-slide-empty-en"   id="d-slide-empty-en"></p>
    </div>`;
    wrap.insertBefore(slide, dots);
    dots.style.display = 'none';
    counter.textContent = '';
    return;
  }

  dots.style.display = 'flex';

  images.forEach((url, i) => {
    const slide = document.createElement('div');
    slide.className = 'd-slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = gdriveUrl(url);
    img.alt = '';
    img.loading = i === 0 ? 'eager' : 'lazy';
    slide.appendChild(img);
    wrap.insertBefore(slide, dots);

    const dot = document.createElement('div');
    dot.className = 'd-slide-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goSlide(i));
    dots.appendChild(dot);
  });

  updateCounter();

  // 複数枚なら自動送り（5秒）
  if (images.length > 1) {
    ssTimer = setInterval(() => goSlide((ssCurrent + 1) % ssImages.length), 5000);
  }

  // スワイプ対応
  wrap.addEventListener('touchstart', e => { ssTouchX = e.touches[0].clientX; }, { passive: true });
  wrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - ssTouchX;
    if (Math.abs(dx) > 40) goSlide(dx < 0
      ? (ssCurrent + 1) % ssImages.length
      : (ssCurrent - 1 + ssImages.length) % ssImages.length);
  }, { passive: true });
}

function goSlide(idx) {
  const slides = document.querySelectorAll('.d-slide');
  const dotEls = document.querySelectorAll('.d-slide-dot');
  if (!slides[idx]) return;
  slides[ssCurrent].classList.remove('active');
  if (dotEls[ssCurrent]) dotEls[ssCurrent].classList.remove('active');
  ssCurrent = idx;
  slides[ssCurrent].classList.add('active');
  if (dotEls[ssCurrent]) dotEls[ssCurrent].classList.add('active');
  updateCounter();
  // タイマーリセット
  clearInterval(ssTimer);
  if (ssImages.length > 1) {
    ssTimer = setInterval(() => goSlide((ssCurrent + 1) % ssImages.length), 5000);
  }
}

function updateCounter() {
  const counter = document.getElementById('d-slide-counter');
  if (ssImages.length > 1) {
    counter.textContent = (ssCurrent + 1) + ' / ' + ssImages.length;
  } else {
    counter.textContent = '';
  }
}

// ── DETAIL ────────────────────────────────────────
function showDetail(id) {
  const loc = locations.find(l=>l.location_id===id);
  if(!loc) return;
  currentId = id;
  currentEmbedUrl = String(loc.youtube_embed_url||'');
  localStorage.setItem('tempei_last', id);

  set('d-era',     loc.era_label||'Japan Chapter');
  set('d-name-en', loc.location_name_en||'');
  set('d-name',    loc.location_name||'');
  set('d-region',  loc.region||'');
  set('d-intro',   loc.intro_text||'');
  set('d-desc',    loc.description_short||'');
  set('d-ambient', loc.ambient_note ? '— '+loc.ambient_note : '');

  // Slideshow
  // スプレッドシートの photo_urls 列（カンマ区切り）または hero_image_url を使用
  let photos = [];
  if (loc.photo_urls) {
    photos = String(loc.photo_urls).split(',').map(s=>s.trim()).filter(Boolean);
  } else if (loc.hero_image_url) {
    photos = [String(loc.hero_image_url).trim()].filter(Boolean);
  }
  buildSlideshow(photos);

  // 画像なしのとき地名を表示
  if (photos.length === 0) {
    setTimeout(() => {
      set('d-slide-empty-name', loc.location_name);
      set('d-slide-empty-en',   loc.location_name_en||'');
    }, 0);
  }

  // Music strip
  const strip = document.getElementById('d-music-strip');
  if(loc.music_title){
    strip.style.display='flex';
    set('d-music-title', loc.music_title||loc.music_title_en||'');
    set('d-music-meta',  loc.music_title_en||'');
    set('d-music-mood',  loc.mood_tag||'');
    const tw = document.getElementById('d-music-thumb-wrap');
    const thumb = String(loc.thumbnail_url||'');
    tw.innerHTML = thumb.startsWith('http')
      ? `<img class="d-music-thumb" src="${gdriveUrl(thumb)}" alt="">`
      : '♪';
  } else strip.style.display='none';

  // Video reset
  const vw = document.getElementById('d-video-wrap');
  const fi = vw.querySelector('iframe');
  if(fi) fi.remove();
  document.getElementById('d-video-ph').style.display='flex';
  set('d-video-label', loc.location_name||'Play Video');

  // Next
  const next = getNext(id);
  const nb = document.getElementById('btn-next');
  if(next){
    set('btn-next-label', 'Next: '+(next.location_name_en||next.location_name));
    nb.style.display='flex';
  } else nb.style.display='none';

  showScreen('detail');
  checkContinue();
}

function set(id, val){
  const el=document.getElementById(id);
  if(el) el.textContent=val;
}

// ── VIDEO ─────────────────────────────────────────
function playVideo(){
  let src = currentEmbedUrl.trim();
  if(!src){ showToast('Video URL is not set yet'); return; }

  // すでに embed URL ならそのまま使う（si= パラメータを保持）
  // youtu.be/XXXX 形式の場合だけ変換
  if(src.includes('youtu.be/')){
    const parts = src.split('youtu.be/')[1].split('?');
    const vid   = parts[0];
    const qs    = parts[1] ? '&' + parts[1] : '';
    src = 'https://www.youtube.com/embed/' + vid + '?' + qs;
  }
  // watch?v= 形式の場合だけ変換
  if(src.includes('watch?v=')){
    const u   = new URL(src);
    const vid = u.searchParams.get('v');
    const si  = u.searchParams.get('si');
    src = 'https://www.youtube.com/embed/' + vid + (si ? '?si=' + si : '');
  }

  // autoplay を追加
  src += (src.includes('?') ? '&' : '?') + 'autoplay=1&rel=0';

  // iframe を挿入
  document.getElementById('d-video-ph').style.display = 'none';
  const iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.title = 'YouTube video player';
  iframe.setAttribute('frameborder', '0');
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
  iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
  iframe.allowFullscreen = true;
  document.getElementById('d-video-wrap').appendChild(iframe);
}

// ── NEXT ──────────────────────────────────────────
function getNext(id){
  const cur = locations.find(l=>l.location_id===id);
  if(!cur) return null;
  return locations
    .filter(l=>+l.unlock_order > +cur.unlock_order)
    .sort((a,b)=>+a.unlock_order - +b.unlock_order)[0]||null;
}
function goNext(){
  const n=getNext(currentId);
  n ? showDetail(n.location_id) : showToast('This is the last destination.');
}

// ── TOAST ─────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
